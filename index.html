<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OG Squad</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffb6b6,#ffd6a5);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
}

img{
    width:180px;
    margin-bottom:20px;
}

h1{
    font-size:52px;
    margin-bottom:35px;
}

button{
    font-size:30px;
    font-weight:bold;
    padding:15px 40px;
    margin:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
}

#yesButton{
    background:#22c55e;
    color:white;
}

#yesButton:hover{
    background:#15803d;
}

#no{
    background:#ef4444;
    color:white;
    position:absolute;
}

#no:hover{
    background:#b91c1c;
}

/* Στυλ για το πεδίο του ονόματος */
input[type="text"] {
    font-size: 24px;
    padding: 12px;
    border: 2px solid #333;
    border-radius: 12px;
    margin-bottom: 20px;
    width: 280px;
    text-align: center;
}

#nextButton {
    background: #3b82f6;
    color: white;
    display: block;
    margin: 0 auto;
}

/* Στυλ για τη νέα FULL-SCREEN ΧΑΡΟΥΜΕΝΗ ΟΘΟΝΗ */
#successSection {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: linear-gradient(135deg, #a8ff78, #78ffd6); /* Χαρούμενα φωτεινά χρώματα */
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    z-index: 9999;
}

#successSection h2 {
    font-size: 64px; /* Μεγάλα γράμματα */
    color: #1e293b;
    margin-bottom: 20px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.1);
}

#successSection p {
    font-size: 32px; /* Μεγάλα γράμματα */
    color: #0f172a;
    font-weight: bold;
    max-width: 800px;
}

.happy-img {
    width: 250px; /* Λίγο πιο μεγάλη για να φαίνεται ωραία */
    margin-bottom: 30px;
}
</style>
</head>

<body>

<div class="container">

    <!-- ΠΡΩΤΗ ΟΘΟΝΗ: ΕΡΩΤΗΣΗ ΓΙΑ ΟΝΟΜΑ -->
    <div id="nameSection">
        <h1>ΓΡΑΨΕ ΤΟ ΟΝΟΜΑ ΣΟΥ:</h1>
        <input type="text" id="visitorName" placeholder="π.χ. Κώστας">
        <button id="nextButton">ΕΠΟΜΕΝΟ</button>
    </div>

    <!-- ΔΕΥΤΕΡΗ ΟΘΟΝΗ: Η ΒΟΛΤΑ -->
    <div id="questionSection" style="display: none;">
        <!-- Η θυμωμένη εικόνα ξεκινάει κρυφή (display: none) -->
        <img src="angry.png" alt="Angry" id="angryImage" style="display: none;">

        <h1>ΘΑ ΕΡΘΕΙΣ ΣΤΗ ΒΟΛΤΑ ΤΟΥ OG SQUAD;</h1>

        <button id="yesButton">YES</button>
        <button id="no">NO</button>
    </div>

</div>

<!-- ΤΡΙΤΗ ΟΘΟΝΗ: ΤΟ ΝΕΟ CUSTOM ΜΗΝΥΜΑ ΕΠΙΤΥΧΙΑΣ -->
<div id="successSection">
    <!-- ΕΔΩ ΜΠΑΙΝΕΙ Η ΧΑΡΟΥΜΕΝΗ ΕΙΚΟΝΑ ΣΟΥ (άλλαξε το happy.png με το όνομα της εικόνας σου) -->
    <img src="happy.png" alt="Happy" class="happy-img">
    
    <h2>Ευχαριστώ pookie! ✨</h2>
    <p>(αν πάτησες no στην αρχή να ξες ο τροχός γυρνάει...)</p>
</div>

<script>

// Διαχείριση εναλλαγής οθονών
const nameSection = document.getElementById("nameSection");
const questionSection = document.getElementById("questionSection");
const successSection = document.getElementById("successSection");
const nextButton = document.getElementById("nextButton");
const visitorNameInput = document.getElementById("visitorName");
const angryImage = document.getElementById("angryImage");

let userName = "";

nextButton.addEventListener("click", function() {
    if (visitorNameInput.value.trim() === "") {
        alert("Βάλε όνομα ρε μπρο!");
        return;
    }
    userName = visitorNameInput.value.trim();
    nameSection.style.display = "none";
    questionSection.style.display = "block";
});

// Ο κώδικας για τα κουμπιά
const yesButton = document.getElementById("yesButton");
const no = document.getElementById("no");

let size = 30;
let imgSize = 180; // Αρχικό μέγεθος της θυμωμένης εικόνας

yesButton.addEventListener("click", function(){
    // --- ΒΑΛΕ ΤΟ ΔΙΚΟ ΣΟΥ ID ΑΠΟ ΤΟ FORMSPREE ΕΔΩ ---
    const formspreeUrl = "https://formspree.io/f/ΕΔΩ_ΒΑΖΕΙΣ_ΤΟ_ΔΙΚΟ_ΣΟΥ_ID";

    const formData = new FormData();
    formData.append("Όνομα", userName);
    formData.append("Απάντηση", "YES");

    // Στέλνει την απάντηση στο mail σου
    fetch(formspreeUrl, {
        method: "POST",
        body: formData,
        headers: { 'Accept': 'application/json' }
    });

    // ΕΔΩ ΠΑΙΖΕΙ Ο ΗΧΟΣ (άλλαξε το sound.mp3 με το όνομα του ήχου σου)
    const audio = new Audio('sound.mp3');
    audio.play();

    // Εξαφανίζει το παλιό site και πετάει τη full-screen χαρούμενη οθόνη
    document.querySelector('.container').style.display = "none";
    successSection.style.display = "flex";
});

no.addEventListener("mouseover", moveButton);

function moveButton(){

    // Εμφάνιση της εικόνας την πρώτη φορά που πλησιάζει το NO
    if (angryImage.style.display === "none") {
        angryImage.style.display = "inline-block";
    }

    const maxX = window.innerWidth - no.offsetWidth;
    const maxY = window.innerHeight - no.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    no.style.left = x + "px";
    no.style.top = y + "px";

    // Μεγαλώνει το YES
    size += 8;
    yesButton.style.fontSize = size + "px";
    yesButton.style.padding = (size / 2) + "px " + size + "px";

    // Μεγαλώνει σταδιακά η θυμωμένη εικόνα
    imgSize += 15;
    angryImage.style.width = imgSize + "px";
}

</script>

</body>
</html>
