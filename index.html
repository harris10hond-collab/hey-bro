<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OG Squad</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffb6b6,#ffd6a5);
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
}

img{
    width:180px;
    margin-bottom:20px;
}

h1{
    font-size:52px;
    margin-bottom:35px;
}

button{
    font-size:30px;
    font-weight:bold;
    padding:15px 40px;
    margin:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
}

#yesButton{
    background:#22c55e;
    color:white;
}

#yesButton:hover{
    background:#15803d;
}

#no{
    background:#ef4444;
    color:white;
    position:absolute;
}

#no:hover{
    background:#b91c1c;
}

/* Στυλ για το πεδίο του ονόματος */
input[type="text"] {
    font-size: 24px;
    padding: 12px;
    border: 2px solid #333;
    border-radius: 12px;
    margin-bottom: 20px;
    width: 280px;
    text-align: center;
}

#nextButton {
    background: #3b82f6;
    color: white;
    display: block;
    margin: 0 auto;
}
</style>
</head>

<body>

<div class="container">

    <!-- ΠΡΩΤΗ ΟΘΟΝΗ: ΕΡΩΤΗΣΗ ΓΙΑ ΟΝΟΜΑ -->
    <div id="nameSection">
        <h1>ΓΡΑΨΕ ΤΟ ΟΝΟΜΑ ΣΟΥ:</h1>
        <input type="text" id="visitorName" placeholder="π.χ. Κώστας">
        <button id="nextButton">ΕΠΟΜΕΝΟ</button>
    </div>

    <!-- ΔΕΥΤΕΡΗ ΟΘΟΝΗ: Η ΒΟΛΤΑ (ΚΡΥΦΗ ΣΤΗΝ ΑΡΧΗ) -->
    <div id="questionSection" style="display: none;">
        <!-- Βάλε εδώ την εικόνα που μου έστειλες -->
        <img src="angry.png" alt="Angry">

        <h1>ΘΑ ΕΡΘΕΙΣ ΣΤΗ ΒΟΛΤΑ ΤΟΥ OG SQUAD;</h1>

        <button id="yesButton">YES</button>
        <button id="no">NO</button>
    </div>

</div>

<script>

// Διαχείριση εναλλαγής οθονών
const nameSection = document.getElementById("nameSection");
const questionSection = document.getElementById("questionSection");
const nextButton = document.getElementById("nextButton");
const visitorNameInput = document.getElementById("visitorName");

let userName = "";

nextButton.addEventListener("click", function() {
    if (visitorNameInput.value.trim() === "") {
        alert("Βάλε όνομα ρε μπρο!");
        return;
    }
    userName = visitorNameInput.value.trim();
    nameSection.style.display = "none";
    questionSection.style.display = "block";
});

// Ο δικός σου κώδικας για τα κουμπιά
const yesButton = document.getElementById("yesButton");
const no = document.getElementById("no");

let size = 30;

yesButton.addEventListener("click", function(){
    // --- ΒΑΛΕ ΤΟ ΔΙΚΟ ΣΟΥ ID ΑΠΟ ΤΟ FORMSPREE ΕΔΩ ---
    const formspreeUrl = "https://formspree.io/f/xkolzyld";

    const formData = new FormData();
    formData.append("Όνομα", userName);
    formData.append("Απάντηση", "YES");

    // Στέλνει την απάντηση στο mail σου
    fetch(formspreeUrl, {
        method: "POST",
        body: formData,
        headers: { 'Accept': 'application/json' }
    });

    alert("GOOD BOY!(AN PATHSES NO THA FAS OMADIKO RAPE KAI THA SE VALOUME NA DEIS TH THRISKEYTIKOU TOU GYMNASIOY GYMNH)");
});

no.addEventListener("mouseover", moveButton);

function moveButton(){

    const maxX = window.innerWidth - no.offsetWidth;
    const maxY = window.innerHeight - no.offsetHeight;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    no.style.left = x + "px";
    no.style.top = y + "px";

    // Μεγαλώνει το YES
    size += 8;
    yesButton.style.fontSize = size + "px";
    yesButton.style.padding = (size / 2) + "px " + size + "px";
}

</script>

</body>
</html>
